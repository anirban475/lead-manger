# /etc/nginx/sites-available/leads.amatec.in
# Mirrors the sales.amatec.in pattern: TLS terminated here, proxy to the
# telecaller-app container published on 127.0.0.1:3020.
# After placing this file:
#   ln -s /etc/nginx/sites-available/leads.amatec.in /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
# (certbot --nginx -d leads.amatec.in will fill in the ssl_certificate lines.)

server {
    server_name leads.amatec.in;

    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/leads.amatec.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leads.amatec.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = leads.amatec.in) { return 301 https://$host$request_uri; }
    listen 80;
    server_name leads.amatec.in;
    return 404;
}
